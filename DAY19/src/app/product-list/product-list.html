<div class="products">

    <h2>Available Products</h2>

    <div class="card-container">

        <div class="card" *ngFor="let product of products">

            <h3>{{product.name}}</h3>

            <p class="price">
                ₹ {{product.price}}
            </p>

            <button
                (click)="addToCart(product)">
                Add To Cart
            </button>

        </div>

    </div>

</div>
