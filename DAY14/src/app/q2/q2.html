<h2>Q2. Job Application Form</h2>

<form [formGroup]="jobForm"
(ngSubmit)="onSubmit()">

<div class="form-group">

<label>Full Name</label>

<input type="text"
formControlName="fullName">

@if(jobForm.get('fullName')?.touched &&
jobForm.get('fullName')?.errors?.['required']){

<p class="error">
Name is required
</p>

}

</div>


<div class="form-group">

<label>Email</label>

<input type="email"
formControlName="email">

@if(jobForm.get('email')?.touched &&
jobForm.get('email')?.errors?.['required']){

<p class="error">
Email is required
</p>

}

</div>


<div class="form-group">

<label>Years of Experience</label>

<input type="number"
formControlName="experience">

</div>


<div class="form-group">

<label>Job Role</label>

<input type="text"
formControlName="role">

</div>

<button type="submit">
Submit
</button>

</form>
